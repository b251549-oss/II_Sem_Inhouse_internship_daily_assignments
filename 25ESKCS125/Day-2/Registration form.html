<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b1120;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

form{
    width:450px;
    background:#111827;
    padding:40px;
    border-radius:20px;
}

h1{
    color:white;
    text-align:center;
    margin-bottom:25px;
    font-size:36px;
}

input,
select{
    width:100%;
    padding:16px;
    margin:12px 0;
    border:2px solid #00bfff;
    border-radius:18px;
    background:#111827;
    color:white;
    font-size:17px;
    outline:none;
}

input::placeholder{
    color:white;
}

select{
    color:white;
}

input[type="submit"]{
    border:2px solid #00ff99;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

input[type="submit"]:hover{
    background:#00ff99;
    color:black;
}
</style>

</head>

<body>

<form>

<h1>Registration Form</h1>

<input type="text" placeholder="Name">

<input type="email" placeholder="Email">

<input type="tel" placeholder="Phone">

<select>
    <option>Select Gender</option>
    <option>Male</option>
    <option>Female</option>
    <option>Other</option>
</select>

<input type="date">

<input type="text" placeholder="Department">

<input type="password" placeholder="Password">

<input type="password" placeholder="Confirm Password">

<input type="submit" value="Submit">

</form>

</body>
</html>
