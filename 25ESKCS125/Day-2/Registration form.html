<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b1120;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

form{
    width:1200px;
    padding:60px;
}

h1{
    font-size:48px;
    margin-bottom:40px;
}

.container{
    gap:30px;
}

input,
select{
    height:75px;
    font-size:22px;
    padding:20px;
    border:3px solid #00bfff;
    border-radius:35px;
}

input[type="submit"]{
    height:75px;
    font-size:24px;
    border:3px solid #00ff99;
}

input[type="submit"]{
    border:2px solid #00ff99;
    font-weight:bold;
    cursor:pointer;
}

input[type="submit"]:hover{
    background:#00ff99;
    color:black;
}
</style>

</head>

<body>

<form>

<h1>Registration Form</h1>

<div class="container">

<input class="small" type="text" placeholder="Name">

<input class="small" type="email" placeholder="Email">

<input class="small" type="tel" placeholder="Phone">

<select class="small">
<option>Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<input class="small" type="date">

<input class="small" type="text" placeholder="Department">

<input class="large" type="password" placeholder="Password">

<input class="large" type="password" placeholder="Confirm Password">

<input class="submit" type="submit" value="Submit">

</div>

</form>

</body>
</html>
