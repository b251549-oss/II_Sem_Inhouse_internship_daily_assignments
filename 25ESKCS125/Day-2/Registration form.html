<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b1120;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

form{
    width:1000px;
    background:#111827;
    padding:40px;
    border-radius:20px;
}

h1{
    color:#fff;
    text-align:center;
    margin-bottom:30px;
    font-size:40px;
}

.container{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:20px;
}

.small{
    grid-column:span 2;
}

.large{
    grid-column:span 3;
}

.submit{
    grid-column:1/7;
}

input,
select{
    width:100%;
    height:60px;
    padding:15px;
    border:2px solid #18b7ff;
    border-radius:30px;
    background:#111827;
    color:white;
    font-size:18px;
    outline:none;
}

input::placeholder{
    color:white;
}

select{
    color:white;
}

input[type="submit"]{
    border:2px solid #00ff99;
    font-weight:bold;
    cursor:pointer;
}

input[type="submit"]:hover{
    background:#00ff99;
    color:black;
}
</style>

</head>

<head>
    <link rel="stylesheet"
          href="styles.css">
</head>

<head>
    <link rel="stylesheet"
          href="Background Colour">
</head>
<body>

<form>

<h1>Registration Form</h1>

<div class="container">

<input class="small" type="text" placeholder="Name">

<input class="small" type="email" placeholder="Email">

<input class="small" type="tel" placeholder="Phone">

<select class="small">
<option>Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<input class="small" type="date">

<input class="small" type="text" placeholder="Department">

<input class="large" type="password" placeholder="Password">

<input class="large" type="password" placeholder="Confirm Password">

<input class="submit" type="submit" value="Submit">

</div>

</form>

</body>
</html>
