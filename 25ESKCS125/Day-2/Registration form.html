<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0b1120,#1b2a49);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

form{
    width:900px;
    padding:35px;
    background:#111827;
    border-radius:20px;
}

h1{
    color:white;
    text-align:center;
    margin-bottom:25px;
}

.row{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

.row input,
.row select{
    flex:1;
}

input,
select{
    width:100%;
    padding:15px;
    border:2px solid #00bfff;
    border-radius:20px;
    background:#111827;
    color:white;
    font-size:16px;
    outline:none;
}

input::placeholder{
    color:#cfd8dc;
}

select{
    color:white;
}

input[type="submit"]{
    width:100%;
    padding:15px;
    border:2px solid #00ff99;
    border-radius:20px;
    background:#111827;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

input[type="submit"]:hover{
    background:#00ff99;
    color:black;
}
</style>

</head>

<body>

<form>

<h1>Registration Form</h1>

<div class="container">

<input class="small" type="text" placeholder="Name">

<input class="small" type="email" placeholder="Email">

<input class="small" type="tel" placeholder="Phone">

<select class="small">
<option>Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<input class="small" type="date">

<input class="small" type="text" placeholder="Department">

<input class="large" type="password" placeholder="Password">

<input class="large" type="password" placeholder="Confirm Password">

<input class="submit" type="submit" value="Submit">

</div>

</form>

</body>
</html>
