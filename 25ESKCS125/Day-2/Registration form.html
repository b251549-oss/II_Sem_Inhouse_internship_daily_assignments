<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    margin:0;
    background:#0b1120;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
}

form{
    width:900px;
    background:#111827;
    padding:40px;
    border-radius:20px;
}

h1{
    color:white;
    text-align:center;
    margin-bottom:30px;
}

.row{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

.row input,
.row select{
    flex:1;
}

input,select{
    padding:16px;
    border:2px solid #00bfff;
    border-radius:18px;
    background:#111827;
    color:white;
    font-size:16px;
    box-sizing:border-box;
}

input[type="submit"]{
    width:100%;
    padding:16px;
    border:2px solid #00ff99;
    border-radius:18px;
    background:#111827;
    color:white;
    font-size:20px;
}

input[type="submit"]:hover{
    background:#00ff99;
    color:black;
}
</style>

</head>

<body>

<form>

<h1>Registration Form</h1>

<div class="row">
<input type="text" placeholder="Name">
<input type="email" placeholder="Email">
<input type="tel" placeholder="Phone">
</div>

<div class="row">
<select>
<option>Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<input type="date">

<input type="text" placeholder="Department">
</div>

<div class="row">
<input type="password" placeholder="Password">
<input type="password" placeholder="Confirm Password">
</div>

<input type="submit" value="Submit">

</form>

</body>
</html>
