<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b1120;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

form{
    width:1100px;
    background:#111827;
    padding:50px;
    border-radius:25px;
}

h1{
    color:white;
    text-align:center;
    font-size:42px;
    margin-bottom:40px;
}

.row{
    display:flex;
    gap:30px;
    margin-bottom:30px;
}

.row input,
.row select{
    flex:1;
}

input,
select{
    width:100%;
    height:65px;
    padding:0 25px;
    border:3px solid #1ea7ff;
    border-radius:35px;
    background:#111827;
    color:white;
    font-size:22px;
    outline:none;
}

input::placeholder{
    color:white;
}

input[type="submit"]{
    width:100%;
    height:70px;
    border:3px solid #00ff99;
    border-radius:35px;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
}

input[type="submit"]:hover{
    background:#00ff99;
    color:black;
}
</style>

</head>

<body>

<form>

<h1>Registration Form</h1>

<div class="row">
<input type="text" placeholder="Name">
<input type="email" placeholder="Email">
<input type="tel" placeholder="Phone">
</div>

<div class="row">
<select>
<option>Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<input type="date">

<input type="text" placeholder="Department">
</div>

<div class="row">
<input type="password" placeholder="Password">
<input type="password" placeholder="Confirm Password">
</div>

<input type="submit" value="Submit">
</form>

</body>
</html>
