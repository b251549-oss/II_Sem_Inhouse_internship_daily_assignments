<!DOCTYPE html>
<html>

<head>
    <title>Registration Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #ffffff; }
        .dark { background-color: #121212 !important; color: #ffffff !important; }
        .registeration {
            box-sizing: border-box;
            border: 2px solid rgb(255, 0, 0);
            text-align: left;
            font-size: large;
            font-family: sans-serif;
            margin: 40px auto;
            border-radius: 15px;
            padding: 30px;
            width: 50%;
        }
        .error-text {
            color: #dc3545;
            font-size: 0.85em;
            display: block;
            margin-top: 5px;
        }
    </style>
</head>

<body bgcolor="#FFF9E3">
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Company</a>
            <button onclick="document.body.classList.toggle('dark')">Toggle Theme</button>
        </div>
    </nav>

    <h1 style="text-align: center; margin-top: 20px;"><u>Registration Form</u></h1>

    <div class="registeration">
        <form id="regForm" novalidate>
            <h4>Name</h4>
            <input type="text" id="name" class="form-control" placeholder="Enter Name">
            <span id="nameError" class="error-text"></span>

            <h4>Email</h4>
            <input type="email" id="email" class="form-control" placeholder="Enter Mail ID">
            <span id="emailError" class="error-text"></span>

            <h4>Phone Number</h4>
            <input type="tel" id="phone" class="form-control" placeholder="Enter 10-digit phone number">
            <span id="phoneError" class="error-text"></span>

            <h4>Hobbies</h4>
            <input type="checkbox" name="hobby" value="Cricket"> Cricket
            <input type="checkbox" name="hobby" value="Football"> Football
            <input type="checkbox" name="hobby" value="Chess"> Chess
            <input type="checkbox" name="hobby" value="Ludo"> Ludo
            <span id="hobbyError" class="error-text"></span>

            <h4>DOB</h4>
            <input type="date" id="dob" class="form-control">
            <span id="dobError" class="error-text"></span>

            <h4>Gender</h4>
            <div>
                <input type="radio" name="gender" value="Male"> Male
                <input type="radio" name="gender" value="Female"> Female
            </div>
            <span id="genderError" class="error-text"></span>

            <h4>Password</h4>
            <input type="password" id="password" class="form-control" placeholder="Enter password">
            <span id="passError" class="error-text"></span>

            <br>
            <button type="submit" class="btn btn-primary">Submit</button>
            <button type="reset" class="btn btn-secondary">Reset</button>
        </form>
    </div>

    <script>
        document.getElementById("regForm").addEventListener("submit", function(event) {
            let isValid = true;

            // Reset errors
            document.querySelectorAll('.error-text').forEach(el => el.innerText = "");

            // Validation logic
            if (document.getElementById("name").value.trim().length < 3) {
                document.getElementById("nameError").innerText = "Name must be at least 3 characters.";
                isValid = false;
            }

            if (!document.getElementById("email").value.includes("@")) {
                document.getElementById("emailError").innerText = "Please enter a valid email.";
                isValid = false;
            }

            if (document.getElementById("phone").value.length !== 10) {
                document.getElementById("phoneError").innerText = "Phone number must be 10 digits.";
                isValid = false;
            }

            if (!document.querySelector('input[name="gender"]:checked')) {
                document.getElementById("genderError").innerText = "Please select a gender.";
                isValid = false;
            }

            if (document.getElementById("password").value.length < 6) {
                document.getElementById("passError").innerText = "Password must be at least 6 characters.";
                isValid = false;
            }

            if (!isValid) {
                event.preventDefault(); // Stop submission
            } else {
                alert("Form submitted successfully!");
            }
        });
    </script>
</body>
