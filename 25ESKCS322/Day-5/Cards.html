<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Student Cards</title>
    <style>
    .main{
        box-sizing: border-box;
        margin-left: 225px;
        margin-right: 225px;    
        margin-top: 100px;
        padding: 20px 20px 20px 20px;
        background-color: #ffa602;
        display: flex;
        flex-wrap: wrap;
    }
    .card{
        width: 200px;
        background-color: #fff;
        margin: 10px;
        padding: 10px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .card img{ width:100px; height:100px; border-radius:50%; margin-top:10px }
    .btn-details{
        margin-top: 8px;
        padding: 6px 10px;
        border: none;
        background: #0077cc;
        color: white;
        border-radius: 6px;
        cursor: pointer;
    }
    .details{
        width: 100%;
        box-sizing: border-box;
        overflow: hidden;
        max-height: 0;
        transition: max-height 0.35s ease;
        text-align: left;
        margin-top: 8px;
        padding: 0 6px;
    }
    .details.open{ max-height: 200px; padding-bottom:8px }
    </style>
</head>
<body>
    <h1 style="text-align: center; margin-top: 50px;">Student Cards</h1>
    <div class="main" id="cardsContainer">
    </div>

    <script>
        const students = [
            {name: "Aditya", cgpa: 9.4, image: "https://randomuser.me/api/portraits/men/1.jpg", email: "aditya@example.com", bio: "Loves math and coffee."},
            {name: "Riya", cgpa: 9.1, image: "https://randomuser.me/api/portraits/women/1.jpg", email: "riya@example.com", bio: "Enjoys painting and design."},
            {name: "Rahul", cgpa: 8.9, image: "https://randomuser.me/api/portraits/men/2.jpg", email: "rahul@example.com", bio: "Frontend developer in training."},
            {name: "Sneha", cgpa: 9.3, image: "https://randomuser.me/api/portraits/women/2.jpg", email: "sneha@example.com", bio: "Aspiring data scientist."}
        ];

        const container = document.getElementById('cardsContainer');
        container.innerHTML = students.map(s => `
            <div class="card">
                <img src="${s.image}" alt="${s.name}">
                <h2>${s.name}</h2>
                <p>CGPA: ${s.cgpa}</p>
                <button class="btn-details">Show Details</button>
                <div class="details">
                    <p><strong>Email:</strong> ${s.email}</p>
                    <p>${s.bio}</p>
                </div>
            </div>
        `).join('');

        // Attach toggle handlers
        document.querySelectorAll('.btn-details').forEach(btn => {
            btn.addEventListener('click', function () {
                const card = this.closest('.card');
                const details = card.querySelector('.details');
                const isOpen = details.classList.toggle('open');
                this.textContent = isOpen ? 'Hide Details' : 'Show Details';
            });
        });
    </script>
    
</body>
</html>
