<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posts Directory</title>
    <style>
    :root {
        --bg: #f7f7f7;
        --surface: #ffffff;
        --text: #1a1a1a;
        --muted: #666666;
        --border: #e8e8e8;
    }
    * { box-sizing: border-box; }
    body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .wrap {
        max-width: 980px;
        margin: 40px auto;
        padding: 0 16px;
    }
    .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 18px;
    }
    h1 {
        margin: 0;
        font-size: 1.35rem;
        font-weight: 600;
    }
    #searchInput {
        width: 260px;
        max-width: 100%;
        border: 1px solid var(--border);
        background: var(--surface);
        padding: 9px 11px;
        border-radius: 8px;
        font-size: 0.95rem;
        outline: none;
    }
    #searchInput:focus {
        border-color: #c8c8c8;
    }
    .main {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 12px;
    }
    .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px;
    }
    .card-head {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
    }
    .card img {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: 1px solid var(--border);
    }
    .name {
        margin: 0;
        font-size: 0.98rem;
        font-weight: 600;
        line-height: 1.2;
    }
    .line {
        margin: 5px 0;
        color: var(--muted);
        font-size: 0.9rem;
        word-break: break-word;
    }
    .empty {
        color: var(--muted);
        margin-top: 8px;
    }
    @media (max-width: 600px) {
        .topbar {
            flex-direction: column;
            align-items: stretch;
            gap: 10px;
        }
        #searchInput {
            width: 100%;
        }
    }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="topbar">
            <h1>Posts Directory</h1>
            <input id="searchInput" type="text" placeholder="Search posts..." aria-label="Search posts">
        </div>
        <div class="main" id="cardsContainer"></div>
        <p class="empty" id="emptyState" hidden>No posts found.</p>
    </div>

    <script>
        const container = document.getElementById('cardsContainer');
        const searchInput = document.getElementById('searchInput');
        const emptyState = document.getElementById('emptyState');
        let postsData = [];

        function renderCards(list) {
            container.innerHTML = '';

            for (const post of list) {
                const card = document.createElement('article');
                card.className = 'card';

                card.innerHTML = `
                    <div class="card-head">
                        <img src="https://ui-avatars.com/api/?name=P${post.id}&background=f2f2f2&color=333&size=96" alt="Post ${post.id}">
                        <h2 class="name">${post.title}</h2>
                    </div>
                    <p class="line">Post ID: ${post.id}</p>
                    <p class="line">User ID: ${post.userId}</p>
                    <p class="line">${post.body}</p>
                `;

                container.appendChild(card);
            }

            emptyState.hidden = list.length !== 0;
        }

        async function loadPosts() {
            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/posts');
                if (!response.ok) throw new Error('Could not load posts');
                postsData = await response.json();
                renderCards(postsData);
            } catch (error) {
                emptyState.hidden = false;
                emptyState.textContent = 'Unable to load posts right now.';
            }
        }

        searchInput.addEventListener('input', () => {
            const term = searchInput.value.trim().toLowerCase();
            const filtered = postsData.filter(post =>
                post.title.toLowerCase().includes(term) ||
                post.body.toLowerCase().includes(term)
            );
            renderCards(filtered);
        });

        loadPosts();
    </script>
    
</body>
</html>
